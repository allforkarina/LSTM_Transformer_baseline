seed: 42
run_dir: runs/csi2pose_tcn

data:
  split_scheme: action_env
  window_size: 16
  window_stride: 4

model:
  feature_dim: 128
  temporal_layers: 3
  temporal_kernel_size: 3
  dropout: 0.1
  heatmap_size: 64
  softargmax_temperature: 0.05

loss:
  coordinate_weight: 1.0
  heatmap_weight: 0.1
  heatmap_sigma: 1.5

metrics:
  pck_thresholds: [5, 10, 20, 50]

train:
  epochs: 80
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  amp: true
  num_workers: 4
  pin_memory: true
